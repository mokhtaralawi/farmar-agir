{% extends "base.html" %}
{% block title %}الملف الشخصي - نظام البيع للمجابرة{% endblock %}
{% block content %}

<h2 style="margin-bottom:20px;"><i class="bi bi-person-circle"></i> الملف الشخصي</h2>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
    <div class="card">
        <h3 style="margin-bottom:15px;"><i class="bi bi-person"></i> تغيير اسم المستخدم</h3>
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="change_username">
            <div class="form-group">
                <label>اسم المستخدم الحالي</label>
                <input type="text" class="form-control" value="{{ request.user.username }}" readonly style="background:#f0f0f0;">
            </div>
            <div class="form-group">
                <label>اسم المستخدم الجديد *</label>
                <input type="text" name="username" class="form-control" required placeholder="أدخل اسم المستخدم الجديد">
            </div>
            <div style="margin-top:15px;text-align:center;">
                <button type="submit" class="btn btn-primary" style="padding:10px 30px;">
                    <i class="bi bi-check-lg"></i> حفظ
                </button>
            </div>
        </form>
    </div>

    <div class="card">
        <h3 style="margin-bottom:15px;"><i class="bi bi-lock"></i> تغيير كلمة المرور</h3>
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="change_password">
            <div class="form-group">
                <label>كلمة المرور الحالية *</label>
                <input type="password" name="current_password" class="form-control" required placeholder="كلمة المرور الحالية">
            </div>
            <div class="form-group">
                <label>كلمة المرور الجديدة *</label>
                <input type="password" name="new_password" class="form-control" required placeholder="كلمة المرور الجديدة (8 أحرف على الأقل)">
            </div>
            <div class="form-group">
                <label>تأكيد كلمة المرور الجديدة *</label>
                <input type="password" name="confirm_password" class="form-control" required placeholder="تأكيد كلمة المرور">
            </div>
            <div style="margin-top:15px;text-align:center;">
                <button type="submit" class="btn btn-primary" style="padding:10px 30px;">
                    <i class="bi bi-check-lg"></i> حفظ
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
