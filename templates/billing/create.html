{% extends "base.html" %}
{% block title %}فاتورة بيع جديدة - نظام البيع للمجابرة{% endblock %}
{% block content %}

<h2 style="margin-bottom:20px;"><i class="bi bi-cart"></i> فاتورة بيع جديدة</h2>

<div class="card">
    <form method="post" id="salesForm">
        {% csrf_token %}

        <div class="form-row">
            <div class="form-group">
                <label>الرعوي *</label>
                <input type="text" id="buyerSearch" class="form-control" placeholder="اكتب اسم الرعوي..." autocomplete="off">
                <input type="hidden" name="buyer" id="buyerId" required>
            </div>
            <div class="form-group">
                <label>المخزن *</label>
                <select name="warehouse" class="form-control" required>
                    <option value="">اختر المخزن</option>
                    {% for w in warehouses %}
                    <option value="{{ w.id }}">{{ w.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>التاريخ</label>
                <input type="date" name="date" class="form-control" value="{{ today }}" required>
            </div>
            <div class="form-group">
                <label>ملاحظات</label>
                <input type="text" name="notes" class="form-control" placeholder="ملاحظات (اختياري)">
            </div>
        </div>

        <hr style="margin:20px 0;">

        <h3 style="margin-bottom:15px;"><i class="bi bi-box-seam"></i> الأصناف</h3>

        <table class="data-table" id="itemsTable">
            <tr>
                <th>الصنف</th>
                <th>الوحدة</th>
                <th>الكمية</th>
                <th>سعر الوحدة</th>
                <th>الخصم</th>
                <th>الإجمالي</th>
                <th></th>
            </tr>
            <tr class="item-row">
                <td>
                    <select name="items[]" class="form-control product-select" required>
                        <option value="">اختر الصنف</option>
                        {% for p in products %}
                        <option value="{{ p.id }}">{{ p.code }} - {{ p.name }}</option>
                        {% endfor %}
                    </select>
                </td>
                <td>
                    <select name="items[]" class="form-control unit-select">
                        <option value="">الوحدة</option>
                        {% for u in units %}
                        <option value="{{ u.id }}">{{ u.name }}</option>
                        {% endfor %}
                    </select>
                </td>
                <td><input type="number" name="items[]" class="form-control qty" step="0.01" min="0" required></td>
                <td><input type="number" name="items[]" class="form-control price" step="0.01" min="0" required></td>
                <td><input type="number" name="items[]" class="form-control discount" step="0.01" min="0" value="0">
                </td>
                <td class="item-total">0</td>
                <td><button type="button" class="btn btn-danger btn-sm remove-row" onclick="removeRow(this)"><i
                            class="bi bi-trash"></i></button></td>
            </tr>
        </table>

        <div style="margin-top:15px;display:flex;gap:10px;">
            <button type="button" class="btn btn-light" onclick="addRow()"><i class="bi bi-plus-lg"></i> إضافة
                صنف</button>
        </div>

        <hr style="margin:20px 0;">

        <div style="text-align:center;font-size:20px;font-weight:700;color:#FF6F00;">
            الإجمالي: <span id="grandTotal">0</span>
        </div>

        <div style="margin-top:20px;text-align:center;">
            <button type="submit" class="btn btn-primary" style="padding:12px 40px;font-size:16px;">
                <i class="bi bi-check-lg"></i> حفظ الفاتورة
            </button>
        </div>
    </form>
</div>

<script>
    var buyersData = [];
    {% for b in buyers %}
    buyersData.push({id: {{ b.id }}, name: "{{ b.name|escapejs }}", code: "{{ b.code }}", current_balance: "{{ b.current_balance }}"});
    {% endfor %}

    var stockData = {{ stock_data|safe }};

    var buyerSearch = document.getElementById('buyerSearch');
    var buyerId = document.getElementById('buyerId');
    var buyerDropdown = document.createElement('div');
    buyerDropdown.className = 'autocomplete-list';
    buyerDropdown.style.display = 'none';
    document.body.appendChild(buyerDropdown);

    buyerSearch.addEventListener('input', function() {
        var q = this.value.toLowerCase().trim();
        buyerDropdown.innerHTML = '';
        if (q.length < 1) { buyerDropdown.style.display = 'none'; return; }
        var matches = [];
        for (var i = 0; i < buyersData.length; i++) {
            var b = buyersData[i];
            if (b.name.toLowerCase().indexOf(q) !== -1 || b.code.toLowerCase().indexOf(q) !== -1) {
                matches.push(b);
            }
        }
        if (matches.length === 0) { buyerDropdown.style.display = 'none'; return; }
        var rect = buyerSearch.getBoundingClientRect();
        buyerDropdown.style.top = (rect.bottom + window.scrollY) + 'px';
        buyerDropdown.style.left = (rect.left + window.scrollX) + 'px';
        buyerDropdown.style.width = rect.width + 'px';
        for (var i = 0; i < matches.length; i++) {
            var b = matches[i];
            var div = document.createElement('div');
            div.className = 'autocomplete-item';
            div.innerHTML = '<strong>' + b.code + '</strong> - ' + b.name + ' <span style="color:#888;font-size:12px;">رصيد: ' + b.current_balance + '</span>';
            div.setAttribute('data-id', b.id);
            div.setAttribute('data-name', b.name);
            buyerDropdown.appendChild(div);
        }
        buyerDropdown.style.display = 'block';
    });

    buyerDropdown.addEventListener('mousedown', function(ev) {
        var target = ev.target;
        while (target && !target.getAttribute('data-id')) { target = target.parentElement; }
        if (target) {
            buyerSearch.value = target.getAttribute('data-name');
            buyerId.value = target.getAttribute('data-id');
            buyerDropdown.style.display = 'none';
        }
    });

    buyerSearch.addEventListener('blur', function() {
        setTimeout(function() { buyerDropdown.style.display = 'none'; }, 200);
    });

    function addRow() {
        const table = document.getElementById('itemsTable');
        const lastRow = table.querySelector('.item-row:last-child');
        const newRow = lastRow.cloneNode(true);
        newRow.querySelectorAll('input,select').forEach(el => el.value = '');
        newRow.querySelector('.item-total').textContent = '0';
        newRow.querySelector('.discount').value = '0';
        table.appendChild(newRow);
        attachListeners(newRow);
    }

    function removeRow(btn) {
        const table = document.getElementById('itemsTable');
        if (table.querySelectorAll('.item-row').length > 1) {
            btn.closest('tr').remove();
            updateTotals();
        }
    }

    function getWarehouseId() {
        var sel = document.querySelector('select[name="warehouse"]');
        return sel ? sel.value : '';
    }

    function getStock(productId, warehouseId) {
        var key = productId + '_' + warehouseId;
        return stockData[key] || 0;
    }

    function checkStock(row) {
        var productSelect = row.querySelector('.product-select');
        var qty = row.querySelector('.qty');
        var stockInfo = row.querySelector('.stock-info');
        if (!productSelect || !productSelect.value || !qty) return;
        var wh = getWarehouseId();
        if (!wh) return;
        var avail = getStock(productSelect.value, wh);
        if (stockInfo) stockInfo.remove();
        var info = document.createElement('span');
        info.className = 'stock-info';
        info.style.cssText = 'display:block;font-size:11px;color:#888;margin-top:2px;';
        var entered = parseFloat(qty.value) || 0;
        if (entered > avail && avail > 0) {
            info.style.color = '#C62828';
            info.style.fontWeight = 'bold';
            info.textContent = 'المتوفر: ' + avail + ' - الكمية غير كافية!';
        } else if (avail > 0) {
            info.style.color = '#2E7D32';
            info.textContent = 'المتوفر: ' + avail;
        } else {
            info.style.color = '#C62828';
            info.textContent = 'غير متوفر في المخزن';
        }
        qty.parentElement.appendChild(info);
    }

    function attachListeners(row) {
        const qty = row.querySelector('.qty');
        const price = row.querySelector('.price');
        const discount = row.querySelector('.discount');
        const total = row.querySelector('.item-total');

        function calc() {
            const q = parseFloat(qty.value) || 0;
            const p = parseFloat(price.value) || 0;
            const d = parseFloat(discount.value) || 0;
            total.textContent = Math.max(0, q * p - d).toFixed(2);
            updateTotals();
            checkStock(row);
        }

        qty.addEventListener('input', calc);
        price.addEventListener('input', calc);
        discount.addEventListener('input', calc);

        var productSelect = row.querySelector('.product-select');
        if (productSelect) {
            productSelect.addEventListener('change', function() { checkStock(row); });
        }
    }

    function updateTotals() {
        let total = 0;
        document.querySelectorAll('.item-total').forEach(el => {
            total += parseFloat(el.textContent) || 0;
        });
        document.getElementById('grandTotal').textContent = total.toFixed(2);
    }

    document.querySelectorAll('.item-row').forEach(attachListeners);

    document.getElementById('salesForm').addEventListener('submit', function (e) {
        var wh = getWarehouseId();
        var rows = document.querySelectorAll('.item-row');
        for (var i = 0; i < rows.length; i++) {
            var row = rows[i];
            var productSelect = row.querySelector('.product-select');
            var qty = row.querySelector('.qty');
            if (productSelect && productSelect.value && qty && qty.value) {
                var avail = getStock(productSelect.value, wh);
                if (parseFloat(qty.value) > avail) {
                    e.preventDefault();
                    alert('الكمية المطلوبة للصنف أكبر من المتوفر في المخزن!');
                    qty.focus();
                    return;
                }
            }
        }

        this.querySelectorAll('[name="items[]"]').forEach(el => el.removeAttribute('name'));
        for (var i = 0; i < rows.length; i++) {
            var row = rows[i];
            var selects = row.querySelectorAll('select');
            var inputsRow = row.querySelectorAll('input:not(.stock-info)');
            if (selects.length >= 2 && inputsRow.length >= 3) {
                var hidden = document.createElement('input');
                hidden.type = 'hidden';
                hidden.name = 'items[]';
                hidden.value = selects[0].value + '|' + selects[1].value + '|' + inputsRow[0].value + '|' + inputsRow[1].value + '|' + inputsRow[2].value;
                this.appendChild(hidden);
            }
        }
    });
</script>

{% endblock %}
