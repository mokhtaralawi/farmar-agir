{% extends "base.html" %}
{% block title %}تحويل بين الصناديق - نظام البيع للمجابرة{% endblock %}
{% block content %}

<h2 style="margin-bottom:20px;"><i class="bi bi-arrow-left-right"></i> تحويل بين الصناديق</h2>

<div class="card">
    <form method="post">
        {% csrf_token %}

        <div class="form-row">
            <div class="form-group">
                <label>من الصندوق *</label>
                <select name="from_box" class="form-control" required>
                    <option value="">اختر</option>
                    {% for box in boxes %}
                    <option value="{{ box.id }}">{{ box.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>إلى الصندوق *</label>
                <select name="to_box" class="form-control" required>
                    <option value="">اختر</option>
                    {% for box in boxes %}
                    <option value="{{ box.id }}">{{ box.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>المبلغ *</label>
            <input type="number" name="amount" class="form-control" step="0.01" min="0" required
                placeholder="أدخل المبلغ">
        </div>

        <div class="form-group">
            <label>الوصف</label>
            <textarea name="description" class="form-control" rows="3" placeholder="وصف التحويل"></textarea>
        </div>

        <div style="margin-top:20px;text-align:center;">
            <button type="submit" class="btn btn-info" style="padding:12px 40px;font-size:16px;">
                <i class="bi bi-check-lg"></i> حفظ التحويل
            </button>
        </div>
    </form>
</div>

{% endblock %}
