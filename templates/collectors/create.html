{% extends "base.html" %}
{% block title %}سند قبض جديد - نظام البيع للمجابرة{% endblock %}
{% block content %}

<h2 style="margin-bottom:20px;"><i class="bi bi-cash-stack"></i> سند قبض جديد</h2>

<div class="card">
    <form method="post">
        {% csrf_token %}

        <div class="form-row">
            <div class="form-group">
                <label>الرعوي *</label>
                <input type="text" id="buyerSearch" class="form-control" placeholder="اكتب اسم الرعوي..." autocomplete="off">
                <input type="hidden" name="buyer" id="buyerId" required>
            </div>
            <div class="form-group">
                <label>طريقة الدفع</label>
                <select name="payment_method" class="form-control">
                    <option value="CASH">نقدي</option>
                    <option value="BANK_TRANSFER">تحويل بنكي</option>
                    <option value="CHECK">شيك</option>
                    <option value="OTHER">أخرى</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>المبلغ *</label>
            <input type="number" name="amount" id="amountInput" class="form-control" step="0.01" min="0" required
                placeholder="أدخل المبلغ">
        </div>

        <div class="form-group">
            <label>الخصم</label>
            <input type="number" name="discount" id="discountInput" class="form-control" step="0.01" min="0" value="0"
                placeholder="مبلغ الخصم (اختياري)">
        </div>

        <div style="font-size:18px;font-weight:700;color:#1565C0;text-align:center;margin:10px 0;">
            الصافي المخصوم من الرصيد: <span id="netTotal">0</span>
        </div>

        <div class="form-group">
            <label>ملاحظات</label>
            <textarea name="notes" class="form-control" rows="3" placeholder="ملاحظات (اختياري)"></textarea>
        </div>

        <div style="margin-top:20px;text-align:center;">
            <button type="submit" class="btn btn-primary" style="padding:12px 40px;font-size:16px;">
                <i class="bi bi-check-lg"></i> حفظ السند
            </button>
        </div>
    </form>
</div>

<script>
    var buyersData = [];
    {% for b in buyers %}
    buyersData.push({id: {{ b.id }}, name: "{{ b.name|escapejs }}", code: "{{ b.code }}", current_balance: "{{ b.current_balance }}"});
    {% endfor %}

    var searchEl = document.getElementById('buyerSearch');
    var idEl = document.getElementById('buyerId');
    var dd = document.createElement('div');
    dd.className = 'autocomplete-list';
    dd.style.display = 'none';
    document.body.appendChild(dd);

    searchEl.addEventListener('input', function() {
        var q = this.value.toLowerCase().trim();
        dd.innerHTML = '';
        if (q.length < 1) { dd.style.display = 'none'; return; }
        var matches = [];
        for (var i = 0; i < buyersData.length; i++) {
            var b = buyersData[i];
            if (b.name.toLowerCase().indexOf(q) !== -1 || b.code.toLowerCase().indexOf(q) !== -1) matches.push(b);
        }
        if (matches.length === 0) { dd.style.display = 'none'; return; }
        var rect = searchEl.getBoundingClientRect();
        dd.style.top = (rect.bottom + window.scrollY) + 'px';
        dd.style.left = (rect.left + window.scrollX) + 'px';
        dd.style.width = rect.width + 'px';
        for (var i = 0; i < matches.length; i++) {
            var b = matches[i];
            var div = document.createElement('div');
            div.className = 'autocomplete-item';
            div.innerHTML = '<strong>' + b.code + '</strong> - ' + b.name + ' <span style="color:#888;font-size:12px;">رصيد: ' + b.current_balance + '</span>';
            div.setAttribute('data-id', b.id);
            div.setAttribute('data-name', b.name);
            dd.appendChild(div);
        }
        dd.style.display = 'block';
    });

    dd.addEventListener('mousedown', function(ev) {
        var t = ev.target;
        while (t && !t.getAttribute('data-id')) t = t.parentElement;
        if (t) { searchEl.value = t.getAttribute('data-name'); idEl.value = t.getAttribute('data-id'); dd.style.display = 'none'; }
    });

    searchEl.addEventListener('blur', function() { setTimeout(function() { dd.style.display = 'none'; }, 200); });

    function updateNet() {
        var amount = parseFloat(document.getElementById('amountInput').value) || 0;
        var discount = parseFloat(document.getElementById('discountInput').value) || 0;
        document.getElementById('netTotal').textContent = (amount + discount).toFixed(2);
    }
    document.getElementById('amountInput').addEventListener('input', updateNet);
    document.getElementById('discountInput').addEventListener('input', updateNet);
    updateNet();
</script>

{% endblock %}
