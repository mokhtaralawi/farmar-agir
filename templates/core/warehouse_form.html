{% extends "base.html" %}
{% block title %}{% if mode == 'create' %}مخزن جديد{% else %}تعديل مخزن{% endif %} - نظام المجابرة{% endblock %}
{% block content %}

<h2 style="margin-bottom:20px;"><i class="bi bi-building"></i> {% if mode == 'create' %}مخزن جديد{% else %}تعديل: {{ warehouse.name }}{% endif %}</h2>

<div class="card" style="max-width:600px;margin:auto;">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>الاسم *</label>
            <input type="text" name="name" class="form-control" required
                   value="{{ warehouse.name|default:'' }}" placeholder="اسم المخزن">
        </div>

        <div class="form-group">
            <label>الاسم بالإنجليزية</label>
            <input type="text" name="name_en" class="form-control"
                   value="{{ warehouse.name_en|default:'' }}" placeholder="Warehouse name">
        </div>

        <div class="form-group">
            <label>الفرع</label>
            <select name="branch" class="form-control">
                <option value="">بدون فرع</option>
                {% for branch in branches %}
                <option value="{{ branch.id }}" {% if warehouse.branch_id == branch.id %}selected{% endif %}>
                    {{ branch.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group" style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" name="is_default" id="is_default" style="width:18px;height:18px;"
                   {% if warehouse.is_default %}checked{% endif %}>
            <label for="is_default" style="margin:0;cursor:pointer;">المخزن الافتراضي</label>
        </div>

        <div class="form-group" style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" name="is_active" id="is_active" style="width:18px;height:18px;"
                   {% if mode == 'create' or warehouse.is_active %}checked{% endif %}>
            <label for="is_active" style="margin:0;cursor:pointer;">نشط</label>
        </div>

        <div style="margin-top:20px;text-align:center;">
            <button type="submit" class="btn btn-primary" style="padding:12px 40px;font-size:16px;">
                <i class="bi bi-check-lg"></i> {% if mode == 'create' %}إنشاء{% else %}حفظ{% endif %}
            </button>
            <a href="{% url 'core:warehouses' %}" class="btn btn-light" style="padding:12px 30px;font-size:16px;margin-right:10px;">
                إلغاء
            </a>
        </div>
    </form>
</div>

{% endblock %}
