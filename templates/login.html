{% load static %}<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2E7D32">
    <title>نظام المجابرة - تسجيل الدخول</title>
    <link rel="icon" href="{% static 'img/icon-192.png' %}" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1B5E20 0%, #4CAF50 50%, #FF6F00 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header i { font-size: 48px; color: #2E7D32; margin-bottom: 10px; }
        .login-header h1 { font-size: 24px; color: #1B5E20; }
        .login-header p { font-size: 14px; color: #757575; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #424242;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2E7D32;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 40px;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #757575;
            padding: 4px;
        }
        .password-toggle:hover {
            color: #2E7D32;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #1B5E20; }
        .alert {
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .alert-error { background: #FFEBEE; color: #C62828; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="bi bi-basket-fill"></i>
            <h1>نظام المجابرة</h1>
            <p>نظام إدارة سوق الخضروات والفواكه بالجملة</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-error">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="post" id="loginForm">
            {% csrf_token %}
            <div class="form-group">
                <label><i class="bi bi-person"></i> اسم المستخدم</label>
                <input type="text" name="username" id="loginUsername" required autofocus placeholder="أدخل اسم المستخدم">
            </div>
            <div class="form-group">
                <label><i class="bi bi-lock"></i> كلمة المرور</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="passwordInput" required placeholder="أدخل كلمة المرور">
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>
            <div class="form-group" style="display:flex;align-items:center;gap:8px;">
                <input type="checkbox" name="remember_me" id="remember_me" style="width:18px;height:18px;">
                <label for="remember_me" style="margin:0;cursor:pointer;font-size:14px;">ذكرني</label>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="bi bi-box-arrow-in-right"></i> تسجيل الدخول
            </button>
        </form>
        <hr style="margin:20px 0;">
        <button type="button" class="btn-login" id="fingerprintBtn" style="display:none;background:#5C6BC0;" onclick="startFingerprintLogin()">
            <i class="bi bi-fingerprint"></i> دخول ببصمة الإصبع
        </button>
    </div>
    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
