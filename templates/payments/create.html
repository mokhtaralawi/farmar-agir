{% extends "base.html" %}
{% block title %}سند صرف جديد - نظام البيع للمجابرة{% endblock %}
{% block content %}

<h2 style="margin-bottom:20px;"><i class="bi bi-cash-coin"></i> سند صرف جديد</h2>

<div class="card">
    <form method="post">
        {% csrf_token %}

        <div class="form-row">
            <div class="form-group">
                <label>الرعوي *</label>
                <select name="farmer" class="form-control" required>
                    <option value="">اختر الرعوي</option>
                    {% for farmer in farmers %}
                    <option value="{{ farmer.id }}">{{ farmer.code }} - {{ farmer.name }} (رصيد: {{
                        farmer.current_balance }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>طريقة الدفع</label>
                <select name="payment_method" class="form-control">
                    <option value="CASH">نقدي</option>
                    <option value="BANK_TRANSFER">تحويل بنكي</option>
                    <option value="CHECK">شيك</option>
                    <option value="OTHER">أخرى</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>المبلغ *</label>
            <input type="number" name="amount" class="form-control" step="0.01" min="0" required
                placeholder="أدخل المبلغ">
        </div>

        <div class="form-group">
            <label>ملاحظات</label>
            <textarea name="notes" class="form-control" rows="3" placeholder="ملاحظات (اختياري)"></textarea>
        </div>

        <div style="margin-top:20px;text-align:center;">
            <button type="submit" class="btn btn-primary" style="padding:12px 40px;font-size:16px;">
                <i class="bi bi-check-lg"></i> حفظ السند
            </button>
        </div>
    </form>
</div>

{% endblock %}
