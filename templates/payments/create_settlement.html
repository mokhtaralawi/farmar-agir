{% extends "base.html" %}
{% block title %}تسوية جديدة - نظام البيع للمجابرة{% endblock %}
{% block content %}

<h2 style="margin-bottom:20px;"><i class="bi bi-card-checklist"></i> إنشاء تسوية مع رعوي</h2>

<div class="card">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>الرعوي *</label>
            <select name="farmer" class="form-control" required>
                <option value="">اختر الرعوي</option>
                {% for farmer in farmers %}
                <option value="{{ farmer.id }}">{{ farmer.code }} - {{ farmer.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>من تاريخ *</label>
                <input type="date" name="period_start" class="form-control" required>
            </div>
            <div class="form-group">
                <label>إلى تاريخ *</label>
                <input type="date" name="period_end" class="form-control" required>
            </div>
        </div>

        <div style="margin-top:20px;text-align:center;">
            <button type="submit" class="btn btn-primary" style="padding:12px 40px;font-size:16px;">
                <i class="bi bi-check-lg"></i> إنشاء التسوية
            </button>
        </div>
    </form>
</div>

{% endblock %}
