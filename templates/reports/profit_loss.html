{% extends "base.html" %}
{% block title %}قائمة الدخل - نظام البيع للمجابرة{% endblock %}
{% block content %}

<h2 style="margin-bottom:20px;"><i class="bi bi-graph-up-arrow"></i> قائمة الدخل والخسائر</h2>

<div class="card" style="margin-bottom:15px;">
    <form method="get" class="form-row">
        <div class="form-group">
            <label>من تاريخ</label>
            <input type="date" name="date_from" class="form-control" value="{{ date_from }}">
        </div>
        <div class="form-group">
            <label>إلى تاريخ</label>
            <input type="date" name="date_to" class="form-control" value="{{ date_to }}">
        </div>
        <div class="form-group" style="display:flex;align-items:flex-end;">
            <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> عرض</button>
        </div>
    </form>
</div>

<div class="card">
    <table class="data-table" style="font-size:16px;">
        <tr>
            <td><strong>الإيرادات (العمولات)</strong></td>
            <td style="color:green;">{{ revenue }}</td>
        </tr>
        <tr>
            <td><strong>المصروفات</strong></td>
            <td style="color:red;">({{ expenses }})</td>
        </tr>
        <tr style="background:{% if net_profit >= 0 %}#E8F5E9{% else %}#FFEBEE{% endif %};font-size:18px;">
            <td><strong style="font-size:18px;">صافي الربح / الخسارة</strong></td>
            <td><strong style="font-size:18px;color:{% if net_profit >= 0 %}green{% else %}red{% endif %};">{{
                    net_profit }}</strong></td>
        </tr>
    </table>
</div>

{% endblock %}
