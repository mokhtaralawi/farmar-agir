{% extends "base.html" %}
{% block title %}إعدادات النظام - نظام البيع للمجابرة{% endblock %}
{% block content %}

<h2 style="margin-bottom:20px;"><i class="bi bi-gear"></i> إعدادات النظام</h2>

<div class="card">
    <form method="post">
        {% csrf_token %}
        
        <h3 style="margin-bottom:15px;">معلومات الشركة</h3>
        <div class="form-row">
            <div class="form-group">
                <label>اسم الشركة</label>
                <input type="text" name="company_name" class="form-control" value="{{ settings.company_name }}">
            </div>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="text" name="company_phone" class="form-control" value="{{ settings.company_phone }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" name="company_email" class="form-control" value="{{ settings.company_email }}">
            </div>
            <div class="form-group">
                <label>العنوان</label>
                <input type="text" name="company_address" class="form-control" value="{{ settings.company_address }}">
            </div>
        </div>
        
        <hr style="margin:20px 0;">
        
        <h3 style="margin-bottom:15px;">إعدادات المالية</h3>
        <div class="form-row">
            <div class="form-group">
                <label>العملة الافتراضية</label>
                <select name="default_currency" class="form-control">
                    <option value="SAR" {% if settings.default_currency == 'SAR' %}selected{% endif %}>ريال سعودي</option>
                    <option value="EGP" {% if settings.default_currency == 'EGP' %}selected{% endif %}>جنيه مصري</option>
                    <option value="USD" {% if settings.default_currency == 'USD' %}selected{% endif %}>دولار أمريكي</option>
                </select>
            </div>
            <div class="form-group">
                <label>نسبة العمولة الافتراضية (%)</label>
                <input type="number" name="default_commission_rate" class="form-control" step="0.01" value="{{ settings.default_commission_rate }}">
            </div>
        </div>
        
        <hr style="margin:20px 0;">
        
        <h3 style="margin-bottom:15px;">إعدادات النظام</h3>
        <div class="form-row">
            <div class="form-group">
                <label>اللغة الافتراضية</label>
                <select name="default_language" class="form-control">
                    <option value="ar" {% if settings.default_language == 'ar' %}selected{% endif %}>العربية</option>
                    <option value="en" {% if settings.default_language == 'en' %}selected{% endif %}>English</option>
                </select>
            </div>
            <div class="form-group">
                <label>نسق رقم الفاتورة</label>
                <input type="text" name="invoice_prefix" class="form-control" value="{{ settings.invoice_prefix }}">
            </div>
        </div>
        
        <div style="margin-top:20px;text-align:center;">
            <button type="submit" class="btn btn-primary" style="padding:12px 40px;font-size:16px;">
                <i class="bi bi-save"></i> حفظ الإعدادات
            </button>
        </div>
    </form>
</div>

{% endblock %}
